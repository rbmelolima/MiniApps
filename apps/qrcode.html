<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 1.4rem;
      color: #111;
      margin-bottom: 24px;
    }

    textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color .2s;
    }

    textarea:focus {
      border-color: #6c63ff;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background .2s, transform .1s;
    }

    #btnGerar {
      background: #6c63ff;
      color: white;
    }

    #btnGerar:hover {
      background: #574fd6;
    }

    #btnGerar:active {
      transform: scale(0.98);
    }

    #btnBaixar {
      background: #f0f0f0;
      color: #333;
      display: none;
      margin-top: 10px;
    }

    #btnBaixar:hover {
      background: #e0e0e0;
    }

    #qr-wrap {
      display: none;
      justify-content: center;
      margin-top: 24px;
    }

    #qrcode canvas,
    #qrcode img {
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🔳 Gerador de QR Code</h1>
    <textarea id="txt" placeholder="Digite um texto ou URL..."></textarea>
    <button id="btnGerar" onclick="gerar()">Gerar QR Code</button>
    <div id="qr-wrap">
      <div id="qrcode"></div>
    </div>
    <button id="btnBaixar" onclick="baixar()">⬇ Baixar imagem</button>
  </div>

  <script>
    let qr = null;

    function gerar() {
      const txt = document.getElementById('txt').value.trim();
      if(!txt) { alert('Digite algum texto ou URL.'); return; }

      const wrap = document.getElementById('qr-wrap');
      const container = document.getElementById('qrcode');
      container.innerHTML = '';
      wrap.style.display = 'flex';

      qr = new QRCode(container, {
        text: txt,
        width: 220,
        height: 220,
        colorDark: '#111111',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });

      document.getElementById('btnBaixar').style.display = 'block';
    }

    function baixar() {
      const canvas = document.querySelector('#qrcode canvas');
      if(!canvas) return;
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'qrcode.png';
      a.click();
    }
  </script>
</body>

</html>
